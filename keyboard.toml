[keyboard]
name = "Totem"
product_name = "Totem"
vendor_id = 0x4C4B
product_id = 0x0001
version = "0.0.1"
manufacturer = "GEIGEIGEIST"
# Tell RMK which chip you are using so it compiles the right BLE stack
chip = "nrf52840" 

[split]
connection = "ble"

# --- LEFT HALF (CENTRAL) ---
[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0
# RMK can auto-generate the BLE MAC address, but you can hardcode it here if you prefer
# ble_addr = [0x18, 0x12, 0x34, 0x56, 0x78, 0x90] 

[split.central.matrix]
matrix_type = "normal"
# XIAO BLE Pins for the left TOTEM half
# Verify these against your soldering job!
col_pins = [
    "P0_04", # D4
    "P0_05", # D5
    "P1_11", # D6
    "P1_12", # D7
    "P1_13"  # D8
]
row_pins = [
    "P0_02", # D0
    "P0_03", # D1
    "P0_28", # D2
    "P0_29"  # D3
]

# --- RIGHT HALF (PERIPHERAL) ---
[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5 # Offsets by 5 columns so it maps to the right half of the layout below
# ble_addr = [0x18, 0x12, 0x34, 0x56, 0x78, 0x91]

[split.peripheral.matrix]
matrix_type = "normal"
# XIAO BLE Pins for the right TOTEM half
# Because the right PCB is usually flipped, double check if the columns are reversed!
col_pins = [
    "P0_04", # D4
    "P0_05", # D5
    "P1_11", # D6
    "P1_12", # D7
    "P1_13"  # D8
]
row_pins = [
    "P0_02", # D0
    "P0_03", # D1
    "P0_28", # D2
    "P0_29"  # D3
]

# --- KEYMAP ---
[layout]
rows = 4
cols = 10
layers = 4

default = [
    ["Q", "W", "E", "R", "T",      "Y", "U", "I", "O", "P"],
    ["A", "S", "D", "F", "G",      "H", "J", "K", "L", "Semicolon"],
    ["Z", "X", "C", "V", "B",      "N", "M", "Comma", "Dot", "Slash"],
    ["No", "No", "LShift", "Space", "LCtrl", "Enter", "Backspace", "RShift", "No", "No"]
]
